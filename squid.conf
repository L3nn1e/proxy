# ----------------------------
# Анонимизация трафика
# ----------------------------
visible_hostname proxy.local
fqdncache_size 2048

forwarded_for off

request_header_access X-Forwarded-For deny all
request_header_access Via  deny all
request_header_access From deny all
request_header_access Server deny all
request_header_access WWW-Authenticate deny all
request_header_access Link deny all
request_header_access Cache-Control deny all
request_header_access Proxy-Connection deny all
request_header_access X-Cache deny all
request_header_access X-Cache-Lookup deny all
request_header_access Pragma deny all
request_header_access Keep-Alive deny all
reply_header_access Via deny all

cache deny all

# ----------------------------
# Xray proxy
# ----------------------------
cache_peer 127.0.0.1 parent 20809 0 no-query name=xray_proxy

dead_peer_timeout 5 seconds
connect_timeout 3 seconds
peer_connect_timeout 3 seconds
forward_timeout 10 seconds
read_timeout 5 minutes

# ----------------------------
# ACL на .ru-домены
# ----------------------------
acl ru_domains dstdomain .ru

# ----------------------------
# ACL фильтрованных клиентов
# ----------------------------
acl filtered_clients src "/etc/squid/filtered_clients.txt"

# ACL белого списка сайтов
acl whitelist dstdomain "/etc/squid/whitelist.txt"

# ----------------------------
# ACL вечерних ресурсов (отдельный файл)
# ----------------------------
acl evening_domains dstdomain "/etc/squid/evening_domains.txt"

# ----------------------------
# Временные ACL
# ----------------------------
# Будни Monday–Friday 16:00–19:00
acl weekday_evening time MTWHF  14:00-16:00

# Выходные Saturday–Sunday 14:00–19:00

acl weekend_evening time A 11:00-16:00
acl weekend_evening time S 11:00-16:00

# ----------------------------
# Локальная сеть
# ----------------------------
acl localnet src 172.16.0.0/13
acl localnet src fc00::/7
acl localnet src fe80::/10
acl localnet src 2001:470:28:bbb::/64
acl localnet src 127.0.0.1
acl localnet src ::1

# ----------------------------
# Порты
# ----------------------------
acl SSL_ports port 443
acl SSL_ports port 4477
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777
acl Safe_ports port 4477
acl CONNECT method CONNECT

# ----------------------------
# Блокировка локальных доменов
# ----------------------------
acl block_local url_regex \.local$ 
http_access deny block_local

acl bypass_caching dstdomain .local
cache deny bypass_caching

# ----------------------------
# Разрешение localhost и менеджера
# ----------------------------
http_access allow localhost manager
http_access deny manager
http_access allow localhost

# ----------------------------
# IPv6 - только для НЕфильтрованных клиентов
# ----------------------------
acl to_ipv6 dst ipv6
http_access allow to_ipv6 !filtered_clients

# ----------------------------
# СТРОГАЯ ФИЛЬТРАЦИЯ ДЛЯ FILTERED_CLIENTS
# ----------------------------

# HTTP: только белый список доменов
http_access allow filtered_clients whitelist

# filtered_clients могут заходить в evening_domains по расписанию
http_access allow filtered_clients evening_domains weekday_evening
http_access allow filtered_clients evening_domains weekend_evening

# HTTPS: ПОЛНОСТЬЮ ЗАПРЕЩЕН
http_access deny filtered_clients CONNECT

# Блокируем ВЕСЬ остальной трафик для filtered_clients
http_access deny filtered_clients

# ----------------------------
# Разрешение локальной сети (нефильтрованные)
# ----------------------------
http_access allow localnet

# ----------------------------
# Домены, которые должны идти через parent
# ----------------------------
acl proxy_domains dstdomain "/etc/squid/proxy_domains.txt"


# ----------------------------
# .ru-домены — напрямую
# ----------------------------
always_direct allow ru_domains

# ----------------------------
# Маршрутизация
# ----------------------------

# 1. .ru — напрямую
always_direct allow ru_domains

# 2. Домены для принудительного прохода через parent
never_direct allow proxy_domains
cache_peer_access xray_proxy allow proxy_domains

acl proxy_ips dst "/etc/squid/proxy_ips.txt"
never_direct allow proxy_ips

cache_peer_access xray_proxy allow proxy_ips



# 3. Всё остальное — не отправлять через parent
cache_peer_access xray_proxy deny all

# ----------------------------
# Порты прокси
# ----------------------------
#http_port 3128
#http_port 3129 intercept
http_port [::]:3128

acl bad_dst dst 0.0.0.0/8
acl bad_ports port 0-1023

acl dhcp port 67 68

http_access deny bad_dst
http_access deny dhcp


# ----------------------------
# Кэширование
# ----------------------------
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern .               0       20%     4320

# ----------------------------
# SNMP
# ----------------------------
acl snmpCommunity snmp_community public
snmp_port 3401
snmp_access allow snmpCommunity all
snmp_incoming_address 0.0.0.0
snmp_outgoing_address 0.0.0.0

# ----------------------------
# DNS
# ----------------------------
dns_nameservers 172.20.2.12


# ----------------------------
# Директория дампов
# ----------------------------
coredump_dir /var/spool/squid

# ----------------------------
# ФИНАЛЬНОЕ ПРАВИЛО - запрет всего остального
# ----------------------------
http_access deny all
